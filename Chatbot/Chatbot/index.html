<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Shop Chat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap');

        :root {
            --bg-1: #071126;
            --bg-2: #081a34;
            --panel: rgba(9, 19, 40, 0.84);
            --panel-2: rgba(12, 28, 56, 0.9);
            --border: rgba(125, 153, 195, 0.25);
            --text: #e7f0ff;
            --muted: #9cb2d6;
            --accent: #22c55e;
            --accent-2: #f59e0b;
            --user-bubble-1: #2f73ff;
            --user-bubble-2: #2056d8;
            --shadow: 0 18px 45px rgba(2, 8, 22, 0.35);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Be Vietnam Pro", "Segoe UI", sans-serif;
            background:
                radial-gradient(circle at 8% 0%, rgba(34, 197, 94, 0.17), transparent 28%),
                radial-gradient(circle at 92% -8%, rgba(245, 158, 11, 0.16), transparent 30%),
                radial-gradient(circle at 50% 120%, rgba(59, 130, 246, 0.18), transparent 45%),
                linear-gradient(165deg, var(--bg-1) 0%, var(--bg-2) 100%);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 12px 20px;
        }

        .shell {
            width: min(1060px, 100%);
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 6px;
            height: calc(100vh - 24px);
            min-height: 0;
        }

        .header {
            background:
                linear-gradient(125deg, rgba(25, 48, 88, 0.45), rgba(7, 22, 47, 0.35)),
                var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 12px 16px;
            backdrop-filter: blur(16px);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: grid;
            place-items: center;
            background: linear-gradient(145deg, #22c55e, #f59e0b);
            color: white;
            font-weight: 900;
            box-shadow: 0 10px 24px rgba(34, 197, 94, 0.3);
        }

        h1 {
            margin: 0;
            font-family: "Sora", "Be Vietnam Pro", sans-serif;
            font-size: clamp(18px, 1.4vw, 24px);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1.15;
        }

        .subtitle {
            margin-top: 4px;
            color: var(--muted);
            font-size: 14px;
            line-height: 1.45;
        }
        .chat-panel {
            background:
                linear-gradient(180deg, rgba(14, 31, 61, 0.44), rgba(10, 23, 47, 0.2)),
                var(--panel-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            padding: 12px;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        #chat-box {
            flex: 1;
            height: clamp(320px, 54vh, 620px);
            overflow-y: auto;
            padding: 2px 2px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            scrollbar-width: thin;
            scrollbar-color: rgba(140, 169, 215, 0.5) transparent;
        }

        .message {
            max-width: 90%;
            padding: 12px 14px;
            border-radius: 16px;
            line-height: 1.55;
            word-wrap: break-word;
            box-shadow: 0 8px 18px rgba(2, 10, 24, 0.2);
            font-size: 14px;
            flex-shrink: 0;
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(145deg, var(--user-bubble-1), var(--user-bubble-2));
            color: white;
            border-bottom-right-radius: 6px;
        }

        .message.ai {
            align-self: flex-start;
            background: rgba(17, 34, 63, 0.72);
            border: 1px solid var(--border);
            color: var(--text);
            border-bottom-left-radius: 6px;
        }

        .answer-text {
            white-space: normal;
        }

        .compare-answer {
            display: grid;
            gap: 10px;
        }

        .compare-answer .answer-text {
            font-size: 14px;
            line-height: 1.7;
        }

        .compare-answer .answer-text strong {
            color: #ffffff;
        }

        .compare-answer .answer-text + .answer-text {
            padding-top: 8px;
            border-top: 1px solid rgba(125, 153, 195, 0.2);
        }

        .contact-card {
            margin-top: 10px;
            border: 1px solid rgba(96, 165, 250, 0.38);
            border-radius: 12px;
            background: linear-gradient(165deg, rgba(30, 64, 121, 0.34), rgba(15, 23, 42, 0.45));
            padding: 10px 12px;
        }

        .contact-title {
            font-weight: 700;
            font-size: 13px;
            color: #c7dcff;
            margin-bottom: 7px;
        }

        .contact-row {
            font-size: 13px;
            color: #dbeafe;
            line-height: 1.55;
        }

        .contact-row + .contact-row {
            margin-top: 4px;
        }

        .contact-row a {
            color: #93c5fd;
            text-decoration: none;
            border-bottom: 1px dotted rgba(147, 197, 253, 0.6);
        }

        .contact-row a:hover {
            color: #bfdbfe;
        }

        .card-list {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: visible;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            gap: 16px;
            margin-top: 16px;
            padding: 10px 4px 20px;
            scrollbar-width: thin;
            scrollbar-color: rgba(34, 197, 94, 0.4) transparent;
            min-height: 400px;
        }

        .recommendation-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(34, 197, 94, 0.2);
            color: #22c55e;
            font-weight: 700;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .recommendation-header svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .card-list.compare-list {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            overflow-x: visible;
            overflow-y: visible;
            gap: 12px;
            padding-bottom: 0;
        }

        .card-list::-webkit-scrollbar {
            height: 6px;
        }

        .card-list::-webkit-scrollbar-thumb {
            background: rgba(34, 197, 94, 0.3);
            border-radius: 999px;
        }

        .citation-card {
            margin-top: 12px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .citation-title {
            font-size: 12px;
            font-weight: 700;
            color: #22c55e;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .citation-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .citation-item {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.4;
        }

        .citation-item small {
            display: block;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 2px;
        }

        .product-card {
            flex: 0 0 260px;
            width: 260px;
            min-height: 420px;
            background: rgba(13, 31, 61, 0.95);
            border: 1px solid rgba(34, 197, 94, 0.25);
            border-radius: 20px;
            overflow: hidden;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }

        .text-only-card {
            border-left: 4px solid #22c55e;
        }

        .card-list.compare-list .product-card {
            flex: initial;
            width: 100%;
            min-width: 0;
        }

        .product-card:hover {
            transform: translateY(-6px);
            border-color: #22c55e;
            box-shadow: 0 12px 30px rgba(34, 197, 94, 0.25);
        }

        .product-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 20px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.4), transparent, rgba(245, 158, 11, 0.4));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .product-card:hover::before {
            opacity: 1;
        }

        .product-image {
            position: relative;
            aspect-ratio: 16 / 10;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(249, 115, 22, 0.1));
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-image img {
            transform: scale(1.08);
        }

        .ai-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 4px 10px;
            background: rgba(34, 197, 94, 0.9);
            color: white;
            font-size: 10px;
            font-weight: 800;
            border-radius: 6px;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3);
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 2;
        }

        .badge {
            position: absolute;
            left: 10px;
            top: 10px;
            padding: 4px 10px;
            border-radius: 6px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #d1fae5;
            font-size: 10px;
            font-weight: 700;
            z-index: 2;
        }

        .product-body {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .product-body h3 {
            margin: 0 0 10px;
            font-size: 18px;
            font-weight: 800;
            color: #22c55e;
            letter-spacing: -0.02em;
            line-height: 1.3;
            min-height: 46px; /* Space for 2 lines of title */
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .product-body p {
            margin: 0 0 14px;
            color: var(--muted);
            line-height: 1.6;
            min-height: 44px;
            flex: 1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .price-section {
            margin-top: auto;
            padding-top: 12px;
            border-top: 1px dashed rgba(255, 255, 255, 0.1);
            margin-bottom: 14px;
        }

        .price-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .product-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .product-actions .btn {
            padding: 10px 8px;
            font-size: 12px;
            gap: 6px;
            border-radius: 12px;
            white-space: nowrap;
        }

        .btn-detail {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .btn-detail:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-buy {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-buy:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(34, 197, 94, 0.4);
        }

        .product-footer {
            display: none; /* Hide old footer styles */
        }

        .price {
            font-size: 18px;
            font-weight: 900;
            color: #fef3c7;
            letter-spacing: -0.01em;
            white-space: nowrap;
        }

        .price-wrap {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
            min-width: 0;
        }

        .price-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            min-width: 0;
        }

        .old-price {
            font-size: 12px;
            color: #94a3b8;
            text-decoration: line-through;
        }

        .discount-badge {
            display: inline-flex;
            flex: 0 0 auto;
            width: fit-content;
            font-size: 11px;
            font-weight: 700;
            color: #fef3c7;
            background: rgba(245, 158, 11, 0.18);
            border: 1px solid rgba(245, 158, 11, 0.38);
            border-radius: 999px;
            padding: 2px 8px;
        }

        .product-buy-btn {
            width: 100%;
            padding: 10px 14px;
            min-height: 38px;
            border-radius: 999px;
            font-size: 13px;
            line-height: 1;
            letter-spacing: 0.01em;
            background: linear-gradient(135deg, #34d399 0%, #22c55e 45%, #16a34a 100%);
            color: #ffffff;
            box-shadow:
                0 10px 22px rgba(34, 197, 94, 0.26),
                inset 0 1px 0 rgba(255, 255, 255, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.12);
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
        }

        .product-buy-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.05);
            box-shadow:
                0 14px 28px rgba(34, 197, 94, 0.32),
                inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }

        @media (max-width: 520px) {
            .product-buy-btn {
                width: 100%;
            }
        }

        .product-buy-btn:active {
            transform: translateY(0);
            box-shadow:
                0 8px 16px rgba(34, 197, 94, 0.22),
                inset 0 1px 0 rgba(255, 255, 255, 0.16);
        }

        .answer-meta {
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
            flex-wrap: wrap;
        }

        .feedback-actions {
            display: inline-flex;
            gap: 6px;
        }

        .feedback-btn {
            border: 1px solid rgba(125, 153, 195, 0.35);
            border-radius: 8px;
            background: rgba(15, 23, 42, 0.6);
            color: #cde2ff;
            font-size: 12px;
            padding: 4px 8px;
            cursor: pointer;
        }

        .feedback-btn:hover {
            border-color: rgba(96, 165, 250, 0.8);
        }

        .btn {
            appearance: none;
            border: 0;
            border-radius: 12px;
            padding: 10px 13px;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform .18s ease, box-shadow .18s ease;
            font-family: inherit;
            font-size: 14px;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn-primary {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
            box-shadow: 0 12px 24px rgba(34, 197, 94, 0.28);
        }

        .empty-state {
            padding: 16px;
            text-align: center;
            color: var(--muted);
            border: 1px dashed var(--border);
            border-radius: 16px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid rgba(125, 153, 195, 0.2);
        }

        #user-input {
            flex: 1;
            min-height: 48px;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(13, 28, 52, 0.75);
            color: var(--text);
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        #user-input:focus {
            border-color: rgba(59, 130, 246, 0.7);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        #user-input::placeholder { color: #94a3b8; }

        .hint {
            margin-top: 12px;
            color: var(--muted);
            font-size: 13px;
            line-height: 1.5;
        }

        .recommendation-message {
            max-width: 100% !important;
            width: 100%;
            padding: 12px 10px !important;
            background: rgba(17, 34, 63, 0.45) !important;
            border-color: rgba(34, 197, 94, 0.2) !important;
        }

        @media (max-width: 640px) {
            body { padding: 10px 12px; }
            .header, .chat-panel { border-radius: 16px; padding: 10px; }
            .input-row { flex-direction: row; gap: 8px; }
            #user-input { padding: 10px 12px; }
            .btn { padding: 8px 12px; }
            .message { max-width: 95%; font-size: 13px; }
            .product-card { flex: 0 0 200px; border-radius: 16px; }
            .product-image { aspect-ratio: 1 / 1; }
            .product-body h3 { font-size: 14px; margin-bottom: 4px; }
            .product-body p { font-size: 12px; min-height: 36px; -webkit-line-clamp: 2; margin-bottom: 10px; }
            .price-section { padding-top: 8px; margin-bottom: 10px; }
            .price { font-size: 16px; }
            .card-list { gap: 12px; padding-bottom: 8px; }
            .ai-badge { padding: 3px 8px; font-size: 9px; }
            .card-list.compare-list { grid-template-columns: 1fr; }
            h1 { font-size: 18px; }
        }

        @media (max-width: 400px) {
            .product-card { flex: 0 0 180px; }
            .product-actions { grid-template-columns: 1fr; gap: 6px; }
            .product-actions .btn { padding: 8px; font-size: 11px; }
            .recommendation-header { font-size: 11px; }
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="header">
            <div class="header-top">
                <div class="brand">
                    <div class="logo">F</div>
                    <div>
                        <h1>Fruit Shop AI Chat</h1>
                        <div class="subtitle">Chat nhanh để lấy gợi ý sản phẩm đúng nhu cầu và tầm giá.</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-panel">
            <div id="chat-box">
                <div class="message ai">Chào bạn! Hãy hỏi mình về sản phẩm, ví dụ: "cho mình xem táo" hoặc "trái cây bán chạy".</div>
            </div>
            <div class="input-row">
                <input id="user-input" type="text" placeholder="Nhập câu hỏi của bạn...">
                <button id="send-btn" class="btn btn-primary" type="button">Gửi</button>
            </div>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const input = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const sessionKey = 'fruit_shop_session_id';
        let sessionId = null;
        let sessionInitPromise = null;

        function createFreshSessionId() {
            const value = (crypto && crypto.randomUUID) ? crypto.randomUUID() : `sess_${Date.now()}_${Math.random().toString(16).slice(2)}`;
            localStorage.setItem(sessionKey, value);
            return value;
        }

        async function initializeSession() {
            const previousSessionId = localStorage.getItem(sessionKey);
            if (previousSessionId) {
                // Keep the existing session to preserve history
                sessionId = previousSessionId;
                return sessionId;
            }

            sessionId = createFreshSessionId();
            return sessionId;
        }

        sessionInitPromise = initializeSession();

        function escapeHtml(text) {
            return String(text)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function formatMoney(value) {
            return new Intl.NumberFormat('vi-VN').format(Number(value || 0)) + ' đ';
        }

        function formatPercentOff(originalPrice, finalPrice) {
            const original = Number(originalPrice || 0);
            const final = Number(finalPrice || 0);
            if (!original || original <= final) return '';
            const percent = Math.round(((original - final) / original) * 100);
            return percent > 0 ? `-${percent}%` : '';
        }

        function formatProductPrice(product) {
            const isFreshFruit = String(product.product_type || '') === 'trai_cay_kg';
            return formatMoney(product.final_price) + (isFreshFruit ? '/kg' : '');
        }

        function formatOldProductPrice(product) {
            const isFreshFruit = String(product.product_type || '') === 'trai_cay_kg';
            return formatMoney(product.original_price) + (isFreshFruit ? '/kg' : '');
        }

        function svgPlaceholder(title) {
            const safeTitle = escapeHtml(title).slice(0, 24);
            const svg = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
                    <defs>
                        <linearGradient id="g" x1="0" x2="1" y1="0" x2="1">
                            <stop offset="0%" stop-color="#22c55e"/>
                            <stop offset="100%" stop-color="#f97316"/>
                        </linearGradient>
                    </defs>
                    <rect width="800" height="600" fill="#0f172a"/>
                    <circle cx="140" cy="110" r="150" fill="rgba(34,197,94,0.24)"/>
                    <circle cx="670" cy="120" r="170" fill="rgba(249,115,22,0.22)"/>
                    <rect x="65" y="92" width="670" height="416" rx="44" fill="url(#g)" opacity="0.94"/>
                    <text x="400" y="305" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" fill="#ffffff">${safeTitle}</text>
                    <text x="400" y="372" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#eef2ff">Ảnh minh họa sản phẩm</text>
                </svg>`;
            return 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg);
        }

        function renderProductCards(products, answerMode = '') {
            if (!products || !products.length) {
                return '<div class="empty-state">Không có sản phẩm để hiển thị.</div>';
            }

            const listClass = answerMode === 'compare' ? 'card-list compare-list' : 'card-list';
            const headerHtml = `
                <div class="recommendation-header">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
                    Sản phẩm gợi ý cho bạn
                </div>
            `;

            return `
                ${headerHtml}
                <div class="${listClass}">
                    ${products.map((product) => {
                        const detailUrl = product.detail_url || (product.buy_url ? product.buy_url.replace('/Cart/AddToCart/', '/Products/Details/') : '#');
                        const imageSrc = product.image_url ? product.image_url : svgPlaceholder(product.name);
                        
                        return `
                            <article class="product-card">
                                <div class="ai-badge">✨ AI Gợi ý</div>
                                <div class="product-image">
                                    <img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(product.name)}">
                                </div>
                                <div class="product-body">
                                    <h3>${escapeHtml(product.name)}</h3>
                                    <p>${escapeHtml(product.description || 'Chưa có mô tả chi tiết cho sản phẩm này.')}</p>
                                    
                                    <div class="price-section">
                                        <div class="price-wrap">
                                            ${Number(product.original_price || 0) > Number(product.final_price || 0)
                                                ? `<div class="old-price">${formatOldProductPrice(product)}</div>`
                                                : ''}
                                            <div class="price-row">
                                                <div class="price">${formatProductPrice(product)}</div>
                                                ${formatPercentOff(product.original_price, product.final_price)
                                                    ? `<div class="discount-badge">${formatPercentOff(product.original_price, product.final_price)}</div>`
                                                    : ''}
                                            </div>
                                        </div>
                                    </div>

                                    <div class="product-actions">
                                        <a class="btn btn-detail" href="${escapeHtml(detailUrl)}" target="_blank">Chi tiết</a>
                                        <a class="btn btn-buy" href="${escapeHtml(product.buy_url || '#')}" target="_blank">Mua ngay</a>
                                    </div>
                                </div>
                            </article>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function appendUserMessage(text) {
            chatBox.insertAdjacentHTML('beforeend', `<div class="message user">${escapeHtml(text)}</div>`);
        }

        function formatContactLine(line) {
            const raw = String(line || '').trim();
            if (!raw) return '';

            const lower = raw.toLowerCase();
            const safeRaw = escapeHtml(raw);

            if (lower.startsWith('zalo:')) {
                const url = raw.slice(raw.indexOf(':') + 1).trim();
                const safeUrl = escapeHtml(url);
                return `Zalo: <a href="${safeUrl}" target="_blank" rel="noopener noreferrer">${safeUrl}</a>`;
            }

            if (lower.includes('sđt/zalo') || lower.includes('sdt/zalo')) {
                const phoneMatch = raw.match(/0\d{8,10}/);
                if (phoneMatch) {
                    const phone = phoneMatch[0];
                    const safePhone = escapeHtml(phone);
                    return `SĐT/Zalo: <a href="tel:${safePhone}">${safePhone}</a>`;
                }
            }

            return safeRaw;
        }

        function formatBotAnswer(answer) {
            const text = String(answer || 'Đã tìm thấy sản phẩm phù hợp.').trim();
            const marker = 'Thông tin liên hệ trực tiếp FRUIT_SHOP:';

            if (!text.includes(marker)) {
                return `<div class="answer-text">${escapeHtml(text).replace(/\n/g, '<br>')}</div>`;
            }

            const [introRaw, contactRaw = ''] = text.split(marker);
            const introHtml = escapeHtml((introRaw || '').trim()).replace(/\n/g, '<br>');
            const lines = contactRaw
                .split('|')
                .map((item) => item.trim())
                .filter(Boolean)
                .map((item) => `<div class="contact-row">${formatContactLine(item)}</div>`)
                .join('');

            return `
                <div class="answer-text">${introHtml}</div>
                <div class="contact-card">
                    <div class="contact-title">Thông tin liên hệ trực tiếp FRUIT_SHOP</div>
                    ${lines}
                </div>
            `;
        }

        async function submitFeedback(responseId, feedback, buttonGroup) {
            if (!responseId) return;
            try {
                await fetch('/chat/feedback', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ session_id: sessionId, response_id: responseId, feedback })
                });
                if (buttonGroup) {
                    buttonGroup.querySelectorAll('.feedback-btn').forEach((btn) => {
                        btn.disabled = true;
                        btn.style.opacity = '0.65';
                    });
                }
            } catch {
                // Ignore feedback errors to avoid breaking chat flow.
            }
        }

        function renderCitations(citations) {
            if (!Array.isArray(citations) || !citations.length) {
                return '';
            }

            return `
                <div class="citation-card">
                    <div class="citation-title">Nguồn tham khảo</div>
                    <div class="citation-list">
                        ${citations.map((citation) => {
                            const label = escapeHtml(citation.label || 'Nguồn');
                            const sourcePath = escapeHtml(citation.source_path || '');
                            const chunkIndex = Number(citation.chunk_index || 0);
                            const score = Number(citation.score || 0).toFixed(3);
                            return `
                                <div class="citation-item">
                                    ${label}
                                    <small>${sourcePath ? `${sourcePath} • ` : ''}chunk ${chunkIndex || 1} • relevance ${score}</small>
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }

        function appendBotMessage(answer, products, extra = {}) {
            const hasProducts = Array.isArray(products) && products.length > 0;
            const shouldRenderCards = hasProducts && extra.display_products !== false;
            const cards = shouldRenderCards ? renderProductCards(products, extra.answer_mode || '') : '';
            const citations = renderCitations(extra.citations || []);
            const answerHtml = formatBotAnswer(answer);
            const responseId = extra.response_id ? escapeHtml(extra.response_id) : '';
            
            let messageClass = 'message ai';
            if (extra.answer_mode === 'compare') messageClass += ' compare-answer';
            if (hasProducts) messageClass += ' recommendation-message';

            chatBox.insertAdjacentHTML('beforeend', `
                <div class="${messageClass}">
                    ${answerHtml}
                    <div class="answer-meta">
                        ${responseId ? `
                            <div class="feedback-actions" data-response-id="${responseId}">
                                <button class="feedback-btn" type="button" data-feedback="up">👍 Hữu ích</button>
                                <button class="feedback-btn" type="button" data-feedback="down">👎 Chưa đúng</button>
                            </div>
                        ` : ''}
                    </div>
                    ${citations}
                    ${cards}
                </div>
            `);

            if (responseId) {
                const wrappers = chatBox.querySelectorAll(`.feedback-actions[data-response-id="${responseId}"]`);
                const group = wrappers[wrappers.length - 1];
                if (group) {
                    group.querySelectorAll('.feedback-btn').forEach((btn) => {
                        btn.addEventListener('click', () => {
                            submitFeedback(responseId, btn.getAttribute('data-feedback'), group);
                        });
                    });
                }
            }
        }

        function appendErrorMessage(message) {
            chatBox.insertAdjacentHTML('beforeend', `<div class="message ai"><span style="color:#fca5a5;">Lỗi: ${escapeHtml(message)}</span></div>`);
        }

        async function sendMessage() {
            if (!sessionId) {
                await sessionInitPromise;
            }
            const query = input.value.trim();
            if (!query) return;

            appendUserMessage(query);
            input.value = '';
            chatBox.insertAdjacentHTML('beforeend', `<div class="message ai"><i>Đang tìm sản phẩm...</i></div>`);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_query: query, session_id: sessionId })
                });

                const rawText = await response.text();
                let data;
                try {
                    data = JSON.parse(rawText);
                } catch {
                    throw new Error(rawText || 'Backend không trả về JSON');
                }

                const aiMessages = chatBox.querySelectorAll('.message.ai');
                aiMessages[aiMessages.length - 1].remove();

                if (!response.ok) {
                    throw new Error(data.detail || 'Lỗi backend');
                }

                appendBotMessage(data.answer, data.products || [], data || {});
            } catch (error) {
                const aiMessages = chatBox.querySelectorAll('.message.ai');
                if (aiMessages.length) {
                    aiMessages[aiMessages.length - 1].remove();
                }
                appendErrorMessage(error.message || 'Không kết nối được với server');
            }

            chatBox.scrollTop = chatBox.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        input.addEventListener('keydown', (event) => {
            event.key === 'Enter' && sendMessage();
        });
    </script>
</body>
</html>
